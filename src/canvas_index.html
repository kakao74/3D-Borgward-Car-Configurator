<script>

    Load()

    var app = pc.Application.getApplication();

    function applyGreyEnvironment() {
        var grey = 0.78;
        app.scene.ambientLight = new pc.Color(grey, grey, grey);
        app.scene.skyboxIntensity = 0.15;

        var hall = app.root.findByName('BW_hall_1');
        if (hall) {
            hall.enabled = false;
        }

        var ground = app.root.findByName('BW_hall_1_ground');
        if (ground) {
            ground.enabled = false;
        }

        ['ext_cam', 'int_cam'].forEach(function (camName) {
            var camEntity = app.root.findByName(camName);
            if (camEntity && camEntity.camera) {
                camEntity.camera.clearColor = new pc.Color(grey, grey, grey, 1);
            }
        });
    }

    function fixTrunkRearGlass() {
        var staticGlass = app.root.findByName('glass');
        var closedGlass = app.root.findByName('door_T_dp');

        function setClosedGlassVisible(visible) {
            if (staticGlass) {
                staticGlass.enabled = visible;
            }
            if (closedGlass) {
                closedGlass.enabled = visible;
            }
        }

        app.on('ext:open_door_t', function () {
            setClosedGlassVisible(false);
        });
        app.on('ext:close_door_t', function () {
            setTimeout(function () {
                setClosedGlassVisible(true);
            }, 1000);
        });
    }

    // Apply configuration when loading completes.
    function starton() {
        applyGreyEnvironment();
        fixTrunkRearGlass();
        try {
            parent.UIon();
        } catch (e) {}
    }
    app.on('start', starton);//



</script>
